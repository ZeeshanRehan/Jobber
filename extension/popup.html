<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      background: #0f0f0f;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 16px;
    }
    .title { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
    .sub { font-size: 11px; color: #555; margin-bottom: 16px; }
    .label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
    input {
      width: 100%;
      background: #1a1a1a;
      border: 0.5px solid #2e2e2e;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      color: #e0e0e0;
      outline: none;
      margin-bottom: 10px;
    }
    input:focus { border-color: #555; }
    button {
      width: 100%;
      background: #e0e0e0;
      color: #0f0f0f;
      border: none;
      border-radius: 6px;
      padding: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 4px;
    }
    button:hover { background: #fff; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .status { font-size: 11px; margin-top: 8px; text-align: center; }
    .status.success { color: #4ade80; }
    .status.error { color: #f87171; }
    .url-preview {
      font-size: 10px;
      color: #444;
      font-family: monospace;
      margin-bottom: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .divider { height: 0.5px; background: #1e1e1e; margin: 12px 0; }
    #setup { display: block; }
    #share-view { display: none; }
  </style>
</head>
<body>
  <p class="title">jobber</p>
  <p class="sub">share jobs with your squad</p>

  <!-- setup view: shown until squad code + name saved -->
  <div id="setup">
    <p class="label">squad code</p>
    <input id="squad-code" placeholder="ABC12345" maxlength="8" />
    <p class="label">your name</p>
    <input id="person-name" placeholder="Zeshan" />
    <button id="save-btn">save</button>
    <p class="status" id="setup-status"></p>
  </div>

  <!-- share view: shown once setup is done -->
  <div id="share-view">
    <p class="url-preview" id="url-preview">detecting page...</p>
    <button id="share-btn">share this job</button>
    <p class="status" id="share-status"></p>
    <div class="divider"></div>
    <button id="reset-btn" style="background: transparent; color: #444; border: 0.5px solid #2e2e2e; font-weight: 400;">
      change settings
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
